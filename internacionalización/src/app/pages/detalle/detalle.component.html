<div *ngIf="user" style="padding: 20px;">

    <div style="max-width: 500px; margin: auto; border: 4px solid #00f2fe;; 
border-radius: 8px;box-shadow: 0 0 30px rgba(0, 242, 254, 0.5); overflow: hidden; background-color: #1a1a1a;">

        <div style="background: black;  color: #ffff00 !important; padding: 20px; text-align: center;
         border: 2px solid #ff0055;  text-shadow: 0 0 30px rgba(24, 163, 152, 0.4);
         text-shadow: 0 0 8px rgba(255, 255, 0, 0.6);">

            <h2 style="margin:0;"> {{ user.name }} </h2>
            <p style="margin: 5px 0 0 0; opacity: 0.8;"> {{ user.email }} </p>

        </div>


        <div style="padding: 20px; line-height: 1.6; color: #39ff14; 
        text-shadow: 0 0 5px rgba(57, 255, 20, 0.4) ">
            <p><strong>Teléfono:</strong> {{ user.phone }}</p>
            <p><strong>Sitio web:</strong> <a [href]="'http://' + user.website" target="_blank">{{
                    user.website}}</a></p>


            <p><strong>Ciudad:</strong> {{ user.address.city }}</p>
            <p><strong>Calle:</strong> {{ user.address.street }}</p>
            <p><strong>Empresa:</strong> {{ user.company.name }}</p>

        </div>

        <button routerLink="/acercade" style="width: 100%; padding: 15px; border:none; background: #1a1a1a; 
                    cursor: pointer; border-top: 1px solid #ff0055; font-weight: bold; color: #39ff14; 
                     text-shadow: 0 0 5px rgba(57, 255, 20, 0.4);">Volver
            a al lista</button>



    </div>
</div>
